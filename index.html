                    ctx.textAlign = 'center';
                    ctx.fillText('💀 你死了！', px, py - 30);
                }

                // 到達終點
                if (parkourReachedEnd) {
                    const alpha = Math.min(1, (50 - parkourEndTimer) / 20);
                    ctx.fillStyle = `rgba(255,215,0,${alpha})`;
                    ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 36px "Noto Sans TC", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🎉 恭喜過關！ 🎉', BASE_WIDTH / 2, BASE_HEIGHT / 2 - 20);
                    ctx.fillText('準備迎接驚喜...', BASE_WIDTH / 2, BASE_HEIGHT / 2 + 30);
                }

                // HUD
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'left';
                ctx.fillText(`死亡次數: ${parkourDeathCount}`, 15, 25);
                ctx.fillText(`進度: ${Math.floor(p.x/PARKOUR_WORLD_LENGTH*100)}%`, 15, 48);
                const distToEnd = Math.max(0, PARKOUR_WORLD_LENGTH - p.x);
                ctx.fillText(`剩餘: ${Math.floor(distToEnd)}m`, 15, 71);

                // 進度條
                const progBarX = 15;
                const progBarY = 80;
                const progBarW = 200;
                ctx.fillStyle = '#333';
                ctx.fillRect(progBarX, progBarY, progBarW, 8);
                const progress = Math.min(1, p.x / PARKOUR_WORLD_LENGTH);
                const progGrad = ctx.createLinearGradient(progBarX, 0, progBarX + progBarW, 0);
                progGrad.addColorStop(0, '#ff0');
                progGrad.addColorStop(1, '#f80');
                ctx.fillStyle = progGrad;
                ctx.fillRect(progBarX, progBarY, progBarW * progress, 8);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(progBarX, progBarY, progBarW, 8);
            }

            // ==================== 結局：巨石強森梗圖 ====================
            function triggerEnding() {
                gameState = STATE.ENDING;
                overlay.classList.add('active');
                // 使用巨石強森經典挑眉表情包
                const rockImages = [
                    'https://upload.wikimedia.org/wikipedia/en/thumb/1/1f/Dwayne_Johnson_2014_%28cropped%29.jpg/220px-Dwayne_Johnson_2014_%28cropped%29.jpg',
                    'https://i.imgflip.com/1bij.jpg',
                    'https://i.kym-cdn.com/entries/icons/original/000/028/207/Screen_Shot_2019-01-17_at_4.22.43_PM.jpg',
                ];
                // 使用較可靠的圖片
                overlayImg.src =
                    'https://i.imgflip.com/1bij.jpg';
                overlayImg.onerror = function() {
                    // 備用：使用文字+emoji
                    overlayImg.style.display = 'none';
                    overlayText.textContent = '🪨 巨石強森說：\n「你以為你贏了嗎？\nCan you smell what The Rock is cooking?」\n💪😏';
                    overlayText.style.fontSize = 'clamp(18px,3vw,28px)';
                };
                overlayImg.onload = function() {
                    overlayImg.style.display = 'block';
                    overlayText.textContent = '🪨 The Rock 覺得你很棒！😏💪';
                };
                overlayText.style.display = 'block';

                // 點擊關閉
                overlay.onclick = function() {
                    overlay.classList.remove('active');
                    overlayImg.style.display = 'block';
                    overlayText.style.display = 'none';
                    resetAllGames();
                };
                overlay.style.pointerEvents = 'all';
            }

            function resetAllGames() {
                gameState = STATE.TICTACTOE;
                resetTicTacToe();
                resetRacing();
                resetParkour();
                parkourDeathCount = 0;
                buildParkourMap();
                particles = [];
                transitionAlpha = 0;
                transitionType = '';
                shakeAmount = 0;
                glitchLines = [];
                stateTimer = 0;
                overlay.classList.remove('active');
                overlay.style.pointerEvents = 'none';
                overlayImg.style.display = 'block';
                overlayText.style.display = 'none';
            }

            // ==================== 主遊戲循環 ====================
            function update() {
                updateTransition();
                updateParticles(1);

                if (gameState === STATE.TICTACTOE) {
                    if (tttFlashTimer > 0) tttFlashTimer--;
                } else if (gameState === STATE.RACING) {
                    updateRacing();
                } else if (gameState === STATE.PARKOUR) {
                    updateParkour();
                }
            }

            function render() {
                ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

                const needsRestore = applyScreenShake(ctx);

                if (gameState === STATE.TICTACTOE) {
                    drawTicTacToe(ctx);
                } else if (gameState === STATE.RACING) {
                    drawRacing(ctx);
                } else if (gameState === STATE.PARKOUR) {
                    drawParkour(ctx);
                } else if (gameState === STATE.ENDING) {
                    // 黑屏
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 30px "Noto Sans TC", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🎬 遊戲結束 🎬', BASE_WIDTH / 2, BASE_HEIGHT / 2);
                }

                drawParticles(ctx);
                drawGlitchOverlay(ctx);

                if (needsRestore) {
                    ctx.restore();
                }

                // 遊戲狀態標籤
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '11px monospace';
                ctx.textAlign = 'right';
                const stateNames = {
                    'tictactoe': '遊戲1: 圈圈叉叉',
                    'racing': '遊戲2: 極速賽車',
                    'parkour': '遊戲3: 地獄跑酷',
                    'ending': '結局'
                };
                ctx.fillText(stateNames[gameState] || '', BASE_WIDTH - 15, BASE_HEIGHT - 10);
            }

            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // ==================== 初始化 ====================
            function init() {
                resizeCanvas();
                updateCanvasOffset();
                resetTicTacToe();
                resetRacing();
                buildParkourMap();
                resetParkour();
                parkourDeathCount = 0;
                gameState = STATE.TICTACTOE;
                particles = [];
                overlay.classList.remove('active');
                overlay.style.pointerEvents = 'none';
                overlayImg.style.display = 'block';
                overlayText.style.display = 'none';
                requestAnimationFrame(gameLoop);
            }

            // 處理窗口大小變化
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateCanvasOffset();
            });

            // 防止移動端滾動
            document.addEventListener('touchmove', function(e) {
                if (e.target.closest('#game-container')) {
                    e.preventDefault();
                }
            }, { passive: false });

            // 啟動遊戲
            init();

            console.log('🎮 三合一終極遊戲已就緒！');
            console.log('📋 遊戲流程：圈圈叉叉 → 賽車 → 跑酷 → 巨石強森');
            console.log('🕹️ 控制：鍵盤方向鍵/WASD + 空白鍵跳躍，或使用螢幕按鈕');
            console.log('💡 提示：機器人必輸，但你快贏時會切換到下一關！');
            console.log('🏃 跑酷地圖長度：' + PARKOUR_WORLD_LENGTH + 'px，充滿初見殺陷阱！');
        })();
    </script>
</body>
</html>
